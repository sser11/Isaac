<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Binding of Isaac - Трансформации Дашборд</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>⚔️ The Binding of Isaac <span>Трансформации Дашборд</span></h1>
            <p>Изучай трансформации, получай рецепты и знакомься с персонажами</p>
        </header>

        <div class="widget-controls">
            <button id="addTransformationsBtn" class="btn btn-primary">➕ Добавить виджет трансформаций</button>
            <button id="addCharactersBtn" class="btn btn-secondary">👥 Добавить виджет персонажей</button>
        </div>

        <div id="widgetsGrid" class="widgets-grid"></div>
    </div>

    <!-- Модальное окно для характеристик персонажа -->
    <div id="characterModal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
